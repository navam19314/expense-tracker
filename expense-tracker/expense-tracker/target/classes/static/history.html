<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro - Expense History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-shell">
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand-wrap">
                <div class="brand-icon">₹</div>
                <div>
                    <p class="brand-title">Expense AI</p>
                    <p class="brand-sub">Future finance suite</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-link" href="/dashboard.html">Dashboard</a>
                <a class="nav-link" href="/expenses.html">Add Expense</a>
                <a class="nav-link active" href="/history.html">Expense History</a>
                <a class="nav-link" href="/categories.html">Categories</a>
                <a class="nav-link" href="/budget.html">Budget Planner</a>
            </nav>
            <div class="sidebar-foot">
                <p class="muted" data-user-email></p>
                <button class="btn btn-secondary" data-logout>Logout</button>
            </div>
        </aside>

        <main class="main-panel">
            <header class="topbar">
                <div class="topbar-title">
                    <p class="topbar-kicker">Transactions</p>
                    <h2>Expense History</h2>
                </div>
                <span class="status-chip">Audit view</span>
            </header>

            <section class="section-card">
                <div class="section-head">
                    <h3>Expense History</h3>
                    <p class="muted">Chronological ledger for all recorded expenses.</p>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Description</th>
                        </tr>
                        </thead>
                        <tbody id="expenseTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>
<div id="toast" class="toast hidden"></div>
<script src="app-common.js"></script>
<script src="history.js"></script>
</body>
</html>
