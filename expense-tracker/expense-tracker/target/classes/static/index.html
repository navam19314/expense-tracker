<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-grid">
        <section class="auth-copy">
            <p class="auth-eyebrow">Expense Tracker Pro</p>
            <h1>Finance workspace for modern teams</h1>
            <p class="muted">Track spending, set monthly budgets, and visualize category-wise trends with a clean dashboard experience.</p>
        </section>
        <section class="auth-wrap">
            <div class="auth-card">
                <h2>Get Started</h2>
                <p class="muted">Login or create your account.</p>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="loginTab">Login</button>
                    <button class="tab-btn" data-tab="registerTab">Register</button>
                </div>
                <div id="loginTab" class="tab-content">
                    <label>Email</label>
                    <input id="loginEmail" type="email" placeholder="you@example.com">
                    <label>Password</label>
                    <input id="loginPassword" type="password" placeholder="••••••••">
                    <button class="btn btn-primary" id="loginBtn">Login</button>
                </div>
                <div id="registerTab" class="tab-content hidden">
                    <label>Email</label>
                    <input id="registerEmail" type="email" placeholder="you@example.com">
                    <label>Password</label>
                    <input id="registerPassword" type="password" placeholder="At least 6 characters">
                    <button class="btn btn-primary" id="registerBtn">Create account</button>
                </div>
                <p id="authMessage" class="inline-message"></p>
            </div>
        </section>
    </div>
</div>
<script src="auth.js"></script>
</body>
</html>
